<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="static/css/style.css">

    <header class="Encabezado">

    <main class="container">

        <section class="row"> <!--Row: fila-->

            <h3 class="cursiva">Ejemplo 2: Caja con 80% de ancho</h3>
            <div class="caja1"></div>

            <a class="link1" href="#">click aqui</a>
        </section>
        <section class="row">
            <h2>Aplicando overflow</h2>
            <div class="caja hidden">
                <p>Ejemplo: hideen</p>
                <div class="example1"></div>
            </div>
            <div class="caja scroll">
                <p>Ejemplo: scroll</p>
                <div class="example2"></div>
            </div>
            <div class="caja auto">
                <p>ejemplo: auto</p>
                <div class="example3"></div>
            </div>
        </section>
                <section class="row">
            <h2>sin overflow</h2>
            <div class="caja">
                <div class="example1"></div> </div>
            <div class="caja">
                <div class="example2"></div></div>
            <div class="caja">
                <div class="example3"></div></div>
        </section>
        <section class="row">
            <div class="banner">

                </div>
