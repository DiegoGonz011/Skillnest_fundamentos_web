<!--Tarea: crear una lista desordenada <ul> utilizando elementos de compra (ejemplo: fruta, lacteos, etc.)-->
<!--Tarea: crar una lista ordenada <ol> para tener tareas pendientes (8 elementos) (ejemplo:regar plantas. etc.)-->    
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
</head>
<body>
    <h1>Lista desordenada</h1>
    <ul>
        <li>Leche</li>
        <li>Huevos</li>
        <li>Yogurt</li>
        <li>Cereal</li>
        <li>Papas fritas</li>
        <li>Tomates</li>
        <li>Paltas</li>
        <li>Pan</li>
    </ul>
    <hr>
    <h1>Lista ordenada</h1>
    <ol>
        <li>Ir al supermercado</li>
        <li>Pasear al perro</li>
        <li>Ver una serie</li>
        <li>Regar un arbol</li>
        <li>Ir al gim</li>
        <li>Hacer tareas del liceo</li>
        <li>Sacara la basura</li>
        <li>Ordenar la pieza</li>
    </ol>
</body>
</html>
