<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de registro</title>
</head>

<body>
    <h1>Crear una cuenta de Discord</h1>
    <form action="/registro" method="post">
        <div>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre">
        </div>

        <div>
            <br>
            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido">
        </div>
        <div>
            <br>
            <label for="correo">Correo electrónico:</label>
            <input type="text" id="correo">
        </div>

        <div>
            <br>
            <label for="contraseña">Contraseña:</label>
            <input type="password" id="contraseña">
        </div>

        <div>
            <br>
            <label for="confirmar_contraseña">Confirmar contraseña:</label>
            <input type="password" id="confirmar_contraseña">
        </div>

        <div>
            <br>
            <label for="Fecha_de_nacimiento">Fecha de nacimiento:</label>
            <input type="date" id="Fecha_de_nacimiento">
        </div>

        <div>
            <br>
            <label for="Genero">Género:</label>
            <input type="radio" name="genero" value="masculino">Masculino
            <input type="radio" name="genero" value="femenino">Femenino
            <input type="radio" name="genero" value="N/A">Prefiero no decirlo
        </div>

        <div>
            <br>
            <label>Descripcion sobre ti</label>
            <br>
            <textarea name="Descripcion" rows="4" cols="30"></textarea>
        </div>

        <div>
            <label>Seleciona tus Intereses</label>
            <br>
            <select name="Intereses">
            <option>Musica</option>
            <option>Peliculas</option>
            <option>Deportes</option>
            <option>Tecnologia</option>
            </select>
        </div>

        <div>
            <br>
            <input type="checkbox" id="suscribirse" name="suscribirse" checked>
            <label for="suscribirse">Al registarte, aceptas los <a href="https://support.discord.com/hc/es/sections/115000344951-Pol%C3%ADticas-y-T%C3%A9rminos">Terminos y condiciones</a> de Discord.</label>
        </div>

        <div>
            <input type="submit" value="Registrarse">
        </div>
    </form>
</body>

</html>
